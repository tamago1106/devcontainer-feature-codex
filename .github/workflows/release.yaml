name: "Release dev container features & Generate Documentation"

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Read feature version"
        id: feature
        run: |
          set -euo pipefail
          version=$(jq -r '.version' src/codex/devcontainer-feature.json)
          tag="v$version"

          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Feature version is missing from src/codex/devcontainer-feature.json" >&2
            exit 1
          fi

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Release tag $tag already exists. Bump the feature version before releasing." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: "Publish Features"
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./src"
          generate-docs: "true"

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Create release tag"
        env:
          TAG: ${{ steps.feature.outputs.tag }}
        run: |
          set -euo pipefail
          git config --global user.email github-actions[bot]@users.noreply.github.com
          git config --global user.name github-actions[bot]
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create PR for Documentation
        id: push_image_info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "Start."
          # Configure git and Push updates
          git config --global user.email github-actions[bot]@users.noreply.github.com
          git config --global user.name github-actions[bot]
          git config pull.rebase false
          branch=automated-documentation-update-$GITHUB_RUN_ID
          git checkout -b $branch
          message='Automated documentation update'
          # Add / update and commit
          git add */**/README.md
          git commit -m 'Automated documentation update [skip ci]' || export NO_UPDATES=true
          # Push
          if [ "$NO_UPDATES" != "true" ] ; then
              git push origin "$branch"
              gh pr create --title "$message" --body "$message"
          fi
